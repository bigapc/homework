# CI workflow – validate project files

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          for f in index.html style.css script.js; do
            if [ ! -f "$f" ]; then
              echo "Missing required file: $f"
              exit 1
            fi
          done
          echo "All required files present."

      - name: Validate JavaScript syntax
        run: node --check script.js && echo "script.js syntax OK"

      - name: Confirm HTML references CSS and JS
        run: |
          grep -q 'href="style.css"' index.html  || { echo "index.html missing style.css link"; exit 1; }
          grep -q 'src="script.js"'  index.html  || { echo "index.html missing script.js tag"; exit 1; }
          echo "HTML references validated."

